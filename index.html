<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Modern</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-container {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        transition: transform 0.3s ease;
      }

      .login-container:hover {
        transform: translateY(-5px);
      }

      h2 {
        text-align: center;
        margin-bottom: 24px;
        color: #1e3c72;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-size: 14px;
        font-weight: 600;
      }

      .input-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s ease;
        outline: none;
      }

      .input-group input:focus {
        border-color: #2a5298;
        box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
      }

      .button-group {
        display: flex;
        gap: 12px;
        margin-top: 28px;
      }

      input[type="submit"],
      input[type="reset"] {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      input[type="submit"] {
        background-color: #2a5298;
        color: white;
      }

      input[type="submit"]:hover {
        background-color: #1e3c72;
        box-shadow: 0 4px 12px rgba(42, 82, 152, 0.3);
      }

      input[type="reset"] {
        background-color: #f1f3f5;
        color: #495057;
      }

      input[type="reset"]:hover {
        background-color: #e9ecef;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>LOGIN</h2>
      <form action="" id="loginForm" onsubmit="login(event)">
        <div class="input-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Masukkan username"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Masukkan password"
            required
          />
        </div>

        <div class="button-group">
          <input type="submit" value="Login" />
          <input type="reset" value="Batal" />
        </div>
      </form>
    </div>

    <script>
      function login(event) {
        // Mencegah form melakukan reload halaman secara default
        event.preventDefault();

        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === "admin" && pass === "admin123") {
          alert("Login Berhasil!");
          // Menggunakan window.location.href lebih stabil untuk redirect via JS
          window.location.href = "projectweb.html";
        } else {
          alert("Login Gagal. Username atau password salah.");
        }
      }
    </script>
  </body>
</html>
